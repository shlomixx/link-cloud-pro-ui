    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <link rel="preconnect" href="https://www.google.com">

    <!-- Optimized font loading - immediate load instead of lazy -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap&subset=latin">
    
    <!-- Inline critical CSS to prevent white screen -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: hsl(20 14% 4%);
        color: hsl(0 0% 99%);
        font-family: 'Gaegu', system-ui, -apple-system, sans-serif;
        min-height: 100vh;
      }
      
      #root {
        min-height: 100vh;
        background: hsl(20 14% 4%);
      }
      
      /* Loading fallback */
      .loading-fallback {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: hsl(20 14% 4%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid hsl(336 78% 57% / 0.3);
        border-top: 3px solid hsl(336 78% 57%);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <!-- Loading fallback that will be replaced by React -->
      <div class="loading-fallback">
        <div class="loading-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
