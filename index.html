<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokilo - Your Links in one place</title>

    <style>
      body {
        background-color: #1a202c; /* צבע רקע משוער */
      }
      .min-h-screen { min-height: 100vh; }
      .pt-16 { padding-top: 4rem; }
      .container { width: 100%; margin-left: auto; margin-right: auto; padding-left: 1rem; padding-right: 1rem; }
      @media (min-width: 640px) { .container { max-width: 640px; } }
      @media (min-width: 768px) { .container { max-width: 768px; } }
      .text-4xl { font-size: 2.25rem; line-height: 2.5rem; }
      .font-normal { font-weight: 400; }
      .text-white { color: #fff; }
      .tracking-wide { letter-spacing: 0.025em; }
      .text-center { text-align: center; }
      .flex-grow { flex-grow: 1; }
    </style>

    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap"></noscript>
    
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
